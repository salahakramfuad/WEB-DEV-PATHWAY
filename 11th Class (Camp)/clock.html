<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-900 flex items-center justify-center">
  <div class="text-center">
    <p class="text-slate-400 text-sm uppercase tracking-widest mb-4">Digital Clock</p>
    <div id="clock" class="font-mono text-6xl md:text-8xl font-bold text-white tabular-nums tracking-tight">
      00:00:00
    </div>
    <p id="date" class="text-slate-500 mt-4 text-lg"></p>
  </div>
  <script src="clock.js"></script>
</body>

</html>
